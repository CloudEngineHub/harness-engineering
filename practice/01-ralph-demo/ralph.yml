# ralph.yml — Ralph Orchestrator 配置（实验记录归档）
# 由 `ralph init --backend claude` 生成（Ralph Orchestrator v2.8.1）。
# 本文件按 README.md「步骤 2」记录的核心配置归档；原始运行目录（/tmp/ralph-demo）
# 中由 init 生成的其余默认字段未存档。
cli:
  backend: "claude"
event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 100
